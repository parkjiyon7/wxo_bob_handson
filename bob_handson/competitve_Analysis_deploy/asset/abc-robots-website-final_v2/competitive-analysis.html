<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Competitive Analysis — ABC Robots</title>

  <style>
    :root{
      --bg:#0b1020;
      --panel:#0f172a;
      --card:#111827;
      --text:#e5e7eb;
      --muted:#9ca3af;
      --accent:#22d3ee;
      --accent2:#6366f1;
    }
    *{box-sizing:border-box}
    body{font-family:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial;margin:0;background:var(--bg);color:var(--text)}
    header{position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 24px;border-bottom:1px solid rgba(148,163,184,.18);background:rgba(11,16,32,.7);backdrop-filter:saturate(140%) blur(8px)}
    .brand{display:flex;align-items:center;gap:12px}
    .logo{display:flex;align-items:center;width:auto;height:auto}
    .brand-name{
      font-weight:900;font-size:22px;letter-spacing:.6px;text-transform:uppercase;
      background:linear-gradient(90deg,var(--accent),var(--accent2));
      -webkit-background-clip:text;background-clip:text;color:transparent;
      text-shadow:0 0 18px rgba(34,211,238,.25);
    }
    nav a{margin:0 10px;color:var(--text);text-decoration:none;opacity:.85;font-weight:700}
    nav a:hover, nav a.active{opacity:1;border-bottom:2px solid var(--accent)}
    .container{max-width:1100px;margin:24px auto;padding:0 18px}

    .card{background:var(--card);border:1px solid rgba(148,163,184,.15);border-radius:14px;padding:16px;box-shadow:0 10px 28px rgba(2,6,23,.45)}
    .section-h2{max-width:1100px;margin:26px auto 8px;padding:0 18px;font-size:32px}
    
    .comparison-form{display:flex;flex-direction:column;gap:16px;margin-top:20px}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .form-group{display:flex;flex-direction:column;gap:8px}
    .form-group label{font-weight:700;color:var(--text);font-size:14px}
    .form-group select{
      background:var(--panel);
      color:var(--text);
      border:1px solid rgba(148,163,184,.25);
      border-radius:8px;
      padding:12px;
      font-size:16px;
      cursor:pointer;
    }
    .form-group select:focus{outline:2px solid var(--accent);outline-offset:2px}
    
    .cta{
      display:inline-block;
      background:linear-gradient(90deg,var(--accent),var(--accent2));
      color:white;
      padding:12px 24px;
      border-radius:12px;
      text-decoration:none;
      font-weight:800;
      box-shadow:0 10px 24px rgba(34,211,238,.25);
      border:none;
      cursor:pointer;
      font-size:16px;
      transition:transform 0.2s;
    }
    .cta:hover{transform:translateY(-2px)}
    .cta:disabled{opacity:0.5;cursor:not-allowed;transform:none}
    
    .results-container{margin-top:24px;display:none}
    .results-container.show{display:block}
    
    .loading{
      text-align:center;
      padding:40px;
      color:var(--muted);
      font-size:18px;
    }
    
    .spinner{
      border:4px solid rgba(148,163,184,.25);
      border-top:4px solid var(--accent);
      border-radius:50%;
      width:40px;
      height:40px;
      animation:spin 1s linear infinite;
      margin:0 auto 16px;
    }
    
    @keyframes spin{
      0%{transform:rotate(0deg)}
      100%{transform:rotate(360deg)}
    }
    
    .result-content{line-height:1.7}
    .result-content h1,.result-content h2,.result-content h3{
      color:var(--accent);
      margin-top:24px;
      margin-bottom:12px;
    }
    .result-content h1{font-size:28px}
    .result-content h2{font-size:24px}
    .result-content h3{font-size:20px}
    .result-content p{margin:12px 0;color:var(--text)}
    .result-content ul,.result-content ol{margin:12px 0;padding-left:24px}
    .result-content li{margin:8px 0;color:var(--text)}
    .result-content strong{color:var(--accent);font-weight:700}
    .result-content code{
      background:var(--panel);
      padding:2px 6px;
      border-radius:4px;
      font-family:monospace;
      color:var(--accent);
    }
    .result-content pre{
      background:var(--panel);
      padding:16px;
      border-radius:8px;
      overflow-x:auto;
      border:1px solid rgba(148,163,184,.15);
    }
    .result-content blockquote{
      border-left:4px solid var(--accent);
      padding-left:16px;
      margin:16px 0;
      color:var(--muted);
      font-style:italic;
    }
    .result-content table{
      width:100%;
      border-collapse:collapse;
      margin:16px 0;
    }
    .result-content th,.result-content td{
      border:1px solid rgba(148,163,184,.25);
      padding:12px;
      text-align:left;
    }
    .result-content th{
      background:var(--panel);
      color:var(--accent);
      font-weight:700;
    }
    
    .error-message{
      background:rgba(239,68,68,.1);
      border:1px solid rgba(239,68,68,.3);
      color:#fca5a5;
      padding:16px;
      border-radius:8px;
      margin-top:16px;
    }
    
    footer{padding:30px 18px;text-align:center;color:var(--muted);border-top:1px solid rgba(148,163,184,.18);margin-top:28px}
  </style>

</head>
<body>
  <header>
    <div class="brand">
      <div class="logo"></div>
      <div>
        <div class="brand-name">ABC Robots</div>
      </div>
    </div>
    <nav id="main-nav">
      <a href="index.html">Home</a>
      <a href="index.html#store">Store</a>
      <a href="competitive-analysis.html" class="active">Competitive Analysis</a>
      <a href="index.html#about">About Us</a>
      <a href="index.html#support">Support</a>
      <a href="index.html#contact">Contact</a>
    </nav>
  </header>

  <main class="container">
    <h2 class="section-h2">Competitive Analysis</h2>
    
    <div class="card">
      <p style="color:var(--muted);margin-bottom:20px">
        Compare any two of our robot products to understand their differences, strengths, and ideal use cases.
      </p>
      
      <form class="comparison-form" id="comparisonForm">
        <div class="form-row">
          <div class="form-group">
            <label for="product1">First Product</label>
            <select id="product1" name="product1" required>
              <option value="">Select a product...</option>
              <option value="AeroWash X1">AeroWash X1</option>
              <option value="HydraClean V9">HydraClean V9</option>
              <option value="Nimbus S7">Nimbus S7</option>
              <option value="Titan UltraHome 360">Titan UltraHome 360</option>
            </select>
          </div>
          
          <div class="form-group">
            <label for="product2">Second Product</label>
            <select id="product2" name="product2" required>
              <option value="">Select a product...</option>
              <option value="AeroWash X1">AeroWash X1</option>
              <option value="HydraClean V9">HydraClean V9</option>
              <option value="Nimbus S7">Nimbus S7</option>
              <option value="Titan UltraHome 360">Titan UltraHome 360</option>
            </select>
          </div>
        </div>
        
        <div>
          <button type="submit" class="cta" id="compareBtn">Compare Products</button>
        </div>
      </form>
      
      <div class="results-container" id="resultsContainer">
        <div class="loading" id="loadingIndicator">
          <div class="spinner"></div>
          <div>Analyzing products...</div>
        </div>
        
        <div class="card" id="resultsCard" style="display:none;margin-top:16px">
          <div class="result-content" id="resultContent"></div>
        </div>
        
        <div class="error-message" id="errorMessage" style="display:none"></div>
      </div>
    </div>
  </main>

  <footer>
    <div class="container">
      <div style="margin-bottom:8px">© ABC Robots — Built with care</div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const form = document.getElementById('comparisonForm');
    const resultsContainer = document.getElementById('resultsContainer');
    const loadingIndicator = document.getElementById('loadingIndicator');
    const resultsCard = document.getElementById('resultsCard');
    const resultContent = document.getElementById('resultContent');
    const errorMessage = document.getElementById('errorMessage');
    const compareBtn = document.getElementById('compareBtn');
    
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const product1 = document.getElementById('product1').value;
      const product2 = document.getElementById('product2').value;
      
      if (!product1 || !product2) {
        alert('Please select both products');
        return;
      }
      
      if (product1 === product2) {
        alert('Please select two different products');
        return;
      }
      
      // Show loading state
      resultsContainer.classList.add('show');
      loadingIndicator.style.display = 'block';
      resultsCard.style.display = 'none';
      errorMessage.style.display = 'none';
      compareBtn.disabled = true;
      
      try {
        const response = await fetch('http://localhost:8000/compare_products', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            product1: product1,
            product2: product2
          })
        });
        
        if (!response.ok) {
          throw new Error(`Server error: ${response.status}`);
        }
        
        const data = await response.json();
        
        if (data.success && data.response) {
          // Convert markdown to HTML
          const htmlContent = marked.parse(data.response);
          resultContent.innerHTML = htmlContent;
          
          // Show results
          loadingIndicator.style.display = 'none';
          resultsCard.style.display = 'block';
        } else {
          throw new Error('Invalid response from server');
        }
      } catch (error) {
        console.error('Error:', error);
        loadingIndicator.style.display = 'none';
        errorMessage.style.display = 'block';
        errorMessage.textContent = `Error: ${error.message}. Please make sure the server is running and try again.`;
      } finally {
        compareBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
